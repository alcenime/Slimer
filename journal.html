<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Journal — Slime Runes</title>
<style>
  :root{
    --bg: #f4f9e9;
    --bg-alt: #eef7db;
    --green: #7ac93c;
    --green-dark: #3f7d1c;
    --green-deep: #1f3d0f;
    --terminal: #16240f;
    --pink: #f4a6c6;
    --cream: #fffdf6;
    --line: #dbe9c2;
    --text: #234015;

    --mood-happy: #7ac93c;
    --mood-angry: #ef6a5f;
    --mood-sad: #6fb3e0;
    --mood-excited: #f0b93a;
    --mood-sleepy: #a687d6;
    --mood-chaos: #2b2b2b;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Trebuchet MS', 'Segoe UI', sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
  }
  .mono{ font-family:'Courier New', monospace; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; border:none; background:none; cursor:pointer; color:inherit; }
  input, select{ font-family:inherit; }

  .wrap{ max-width:1320px; margin:0 auto; padding:0 32px; }

  /* ---------- NAVBAR ---------- */
  .navbar{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:16px;
    padding:22px 32px;
    max-width:1320px;
    margin:0 auto;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:20px; color:var(--green-deep); }
  .brand .blob-face{ width:42px; height:42px; border-radius:50%; overflow:hidden; }
  .brand .blob-face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .brand .lines{ display:flex; flex-direction:column; line-height:1.05; }
  .brand .lines span:first-child{ color:var(--green); }

  .navlinks{
    display:flex; align-items:center; gap:4px;
    background:var(--cream);
    border-radius:999px;
    padding:6px;
    box-shadow:inset 0 0 0 1px var(--line);
    justify-self:center;
  }
  .navlinks a{
    display:flex; align-items:center; gap:7px;
    padding:10px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    color:#5a6b48;
  }
  .navlinks a.active{ background:var(--bg-alt); color:var(--green-dark); }

  .navbar .btn-terminal{ justify-self:end; }
  .btn-terminal{
    display:flex; align-items:center; gap:8px;
    background:var(--terminal);
    color:#a9e57a;
    font-weight:700;
    font-size:14px;
    padding:12px 20px;
    border-radius:10px;
    white-space:nowrap;
    box-shadow: inset 0 0 0 1px transparent;
    transition: box-shadow .2s ease;
  }
  .btn-terminal.wallet-connected{
    box-shadow: inset 0 0 0 1px #a9e57a;
  }

  /* ---------- TOOLBAR ---------- */
  .journal-top{
    display:grid;
    grid-template-columns:1fr 300px;
    grid-template-rows:auto auto;
    gap:16px 24px;
    align-items:start;
    margin:8px 0 28px;
  }
  .head-block{ grid-column:1; grid-row:1; }
  .head-block h1{ font-size:30px; color:var(--green-deep); margin-bottom:6px; }
  .head-block p{ font-size:14.5px; color:#5a6b48; }

  .search-sort{ grid-column:2; grid-row:1; display:flex; gap:10px; }
  .search-box{
    flex:1;
    display:flex; align-items:center; gap:8px;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 14px;
    font-size:13px;
    color:#5a6b48;
  }
  .search-box input{
    border:none; outline:none; background:none;
    font-size:13px; color:var(--text); width:100%;
  }
  .sort-select{
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 14px;
    font-size:13px;
    font-weight:600;
    color:var(--green-dark);
  }

  .filters-row{
    grid-column:1; grid-row:2;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .mood-chip{
    display:flex; align-items:center; gap:7px;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:999px;
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    color:#5a6b48;
  }
  .mood-chip.active{ background:var(--bg-alt); border-color:var(--green); color:var(--green-dark); }

  .mood-widget{
    grid-column:2; grid-row:2;
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 18px;
  }
  .mood-widget h4{ font-size:13px; color:var(--green-deep); margin-bottom:12px; }
  .mood-widget-body{ display:flex; align-items:center; gap:14px; }
  .donut{
    width:64px; height:64px;
    border-radius:50%;
    flex-shrink:0;
  }
  .mood-legend{ font-size:11.5px; display:flex; flex-direction:column; gap:4px; flex:1; }
  .mood-legend .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; color:#5a6b48; }
  .mood-legend .row .dot-label{ display:flex; align-items:center; gap:6px; }
  .mood-legend .dot{ width:8px; height:8px; border-radius:50%; }
  .mood-legend .pct{ font-weight:700; color:var(--green-deep); }

  /* ---------- FEED GRID ---------- */
  .feed-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    padding-bottom:50px;
  }
  .jcard{
    background:var(--cream);
    border:1px solid var(--line);
    border-radius:18px;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .jcard-head{ display:flex; align-items:center; justify-content:space-between; }
  .mood-badge{
    display:flex; align-items:center; gap:6px;
    padding:5px 11px;
    border-radius:999px;
    font-size:11.5px;
    font-weight:700;
  }
  .jcard-head-icons{ display:flex; align-items:center; gap:10px; color:#9db384; }
  .jcard-head-icons button{ font-size:14px; }
  .jcard-head-icons button.saved{ color:var(--green-dark); }

  .jcard-user{ display:flex; align-items:center; gap:10px; }
  .avatar{
    width:32px; height:32px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    flex-shrink:0;
  }
  .jcard-user .uname{ font-size:13px; font-weight:700; color:var(--green-deep); display:flex; align-items:center; gap:4px; }
  .jcard-user .utime{ font-size:11px; color:#8ba36e; }

  .jcard h3{ font-size:15px; color:var(--green-deep); line-height:1.3; }
  .jcard .jtext{
    font-size:12.5px;
    color:#5a6b48;
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .jcard-photo{
    aspect-ratio:1.3/1;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    overflow:hidden;
  }

  .jcard-stats{
    display:flex; align-items:center; gap:16px;
    font-size:12px; color:#5a6b48;
    padding-top:4px;
    border-top:1px solid var(--line);
    margin-top:2px;
  }
  .jcard-stats span{ display:flex; align-items:center; gap:5px; }
  .like-btn{ display:flex; align-items:center; gap:5px; font-size:12px; color:#5a6b48; }
  .like-btn.liked{ color:#ef6a5f; font-weight:700; }

  .load-more-wrap{ text-align:center; padding-bottom:70px; }
  .load-more-btn{
    background:var(--bg-alt);
    border:1px solid var(--green);
    color:var(--green-dark);
    font-weight:700;
    font-size:14px;
    padding:13px 30px;
    border-radius:999px;
  }
  .load-more-btn:hover{ background:var(--green); color:var(--cream); }

  @media (max-width: 1100px){
    .feed-grid{ grid-template-columns:repeat(2,1fr); }
    .journal-top{ grid-template-columns:1fr; }
    .search-sort{ grid-column:1; grid-row:2; }
    .filters-row{ grid-row:3; }
    .mood-widget{ grid-column:1; grid-row:4; }
  }
  /* ---------- MOBILE MENU (hamburger) ---------- */
  .hamburger{
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:5px;
    width:42px;
    height:42px;
    background:var(--cream);
    border-radius:999px;
    box-shadow: inset 0 0 0 1px var(--line);
    cursor:pointer;
    justify-self:end;
  }
  .hamburger span{
    display:block;
    width:18px;
    height:2px;
    background:var(--green-deep);
    border-radius:2px;
    transition:transform .25s ease, opacity .25s ease;
  }
  .hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2){ opacity:0; }
  .hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

  .mobile-menu{
    display:none;
    flex-direction:column;
    gap:4px;
    background:var(--cream);
    margin:0 32px 16px;
    padding:10px;
    border-radius:18px;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .mobile-menu a{
    padding:12px 16px;
    border-radius:12px;
    font-weight:600;
    font-size:14.5px;
    color:#5a6b48;
  }
  .mobile-menu a.active{
    background:var(--bg-alt);
    color:var(--green-dark);
  }
  .mobile-menu.open{ display:flex; }

  @media (max-width: 640px){
    .feed-grid{ grid-template-columns:1fr; }
    .navlinks{ display:none; }
    .navbar{ grid-template-columns:1fr auto auto; }
    .hamburger{ display:flex; }
    .btn-terminal{ padding:10px 16px; font-size:12.5px; }
    .search-sort{ flex-direction:column; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="brand">
    <div class="blob-face"><img src="assets/overview/slimelogo.png" alt="Slime Runes mascot"></div>
    <div class="lines"><span>SLIME</span><span>RUNES</span></div>
  </div>
  <nav class="navlinks">
    <a href="index.html">overview</a>
    <a href="journal.html" class="active">journal</a>
    <a href="create.html">create</a>
    <a href="profile.html">profile</a>

  <a href="#" class="btn-terminal" data-wallet-btn>connect wallet</a>

<nav class="mobile-menu" id="mobileMenu">

</nav>

<script>
  function toggleMobileMenu(){
    document.getElementById('hamburgerBtn').classList.toggle('open');
    document.getElementById('mobileMenu').classList.toggle('open');
  }
</script>
<script src="wallet.js"></script>

<div class="wrap">

  <!-- TOOLBAR -->
  <div class="journal-top">
    <div class="head-block">
      <h1>Slime Journal 🌿</h1>
      <p>See how other slimes are feeling today.</p>
    </div>

    <div class="search-sort">
      <div class="search-box">
        🔍 <input type="text" id="searchInput" placeholder="Search journal...">
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="latest">Latest</option>
        <option value="popular">Popular</option>
      </select>
    </div>

    <div class="filters-row" id="filtersRow">
      <button class="mood-chip active" data-mood="All">🍀 All</button>
      <button class="mood-chip" data-mood="Happy">😊 Happy</button>
      <button class="mood-chip" data-mood="Angry">😠 Angry</button>
      <button class="mood-chip" data-mood="Sad">😢 Sad</button>
      <button class="mood-chip" data-mood="Excited">🤩 Excited</button>
      <button class="mood-chip" data-mood="Sleepy">😴 Sleepy</button>
      <button class="mood-chip" data-mood="Chaos">🌀 Chaos</button>
    </div>

    <div class="mood-widget">
      <h4>✨ Today's Mood</h4>
      <div class="mood-widget-body">
        <div class="donut" id="moodDonut"></div>
        <div class="mood-legend" id="moodLegend"></div>
      </div>
    </div>
  </div>

  <!-- FEED -->
  <div class="feed-grid" id="feedGrid"></div>

  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">Load More</button>
  </div>

</div>

<script>
  const MOOD_COLORS = {
    Happy:   { bg:'#e4f6cf', text:'#3f7d1c', solid:'#7ac93c' },
    Angry:   { bg:'#fbe1de', text:'#c14f43', solid:'#ef6a5f' },
    Sad:     { bg:'#e1f0f9', text:'#2f6f96', solid:'#6fb3e0' },
    Excited: { bg:'#fcf0d3', text:'#a3780f', solid:'#f0b93a' },
    Sleepy:  { bg:'#eee3fa', text:'#6b46a8', solid:'#a687d6' },
    Chaos:   { bg:'#e5e5e5', text:'#2b2b2b', solid:'#2b2b2b' }
  };
  const MOOD_EMOJI = { Happy:'😊', Angry:'😠', Sad:'😢', Excited:'🤩', Sleepy:'😴', Chaos:'🌀' };

  const SAMPLE_POSTS = [
    { id:'s1', mood:'Happy', user:'GreenLeaf', avatar:'🐸', time:'10m ago', title:'Aku seneng bgt hari ini!', text:'Habis HP 1k$ dari farming pagi tadi. Terima kasih semesta! 💚✨', likes:128, comments:23, runes:12 },
    { id:'s2', mood:'Angry', user:'RageSlime', avatar:'😡', time:'25m ago', title:'Hari ini aku apes banget dah!', text:'Gas fee mahal, transaksi gagal mulu. Mana rugi lagi! 🔥', likes:98, comments:41, runes:8 },
    { id:'s3', mood:'Sad', user:'BlueSlime', avatar:'💧', time:'1h ago', title:'Sedih banget hari ini...', text:'Project yang kupegang dari awal tutup tiba-tiba. Lost semua hope 😢', likes:76, comments:19, runes:3 },
    { id:'s4', mood:'Excited', user:'DreamSlime', avatar:'⭐', time:'2h ago', title:'OMG! Tidak nyangka!', text:'Baru aja dapet legendary rune di dungeon! Hoki banget hari ini! 🤩', likes:142, comments:35, runes:15 },
    { id:'s5', mood:'Sleepy', user:'SleepySlime', avatar:'😴', time:'3h ago', title:'Capek banget hari ini 😴', text:'Kerja terus dari pagi sampai malam. Saatnya istirahat yang cukup 🥱', likes:64, comments:16, runes:2 },
    { id:'s6', mood:'Chaos', user:'ChaosSlime', avatar:'🌀', time:'4h ago', title:'Hari yang random abis!', text:'Bangun tidur tenggelam di kolam, terus ketemu naga, terus dapet airdrop 😂', likes:87, comments:28, runes:6 },
    { id:'s7', mood:'Happy', user:'PlantSlime', avatar:'🌱', time:'5h ago', title:'Menanam hari ini 🌱', text:'Menanam tanaman kecil hari ini. Semoga tumbuh besar seperti mimpiku.', likes:55, comments:11, runes:1 },
    { id:'s8', mood:'Sad', user:'LonelySlime', avatar:'💙', time:'6h ago', title:'Merasa sendirian...', text:'Kadang merasa ga ada yang ngerti. Tapi gapapa, aku kuat kok! 💙', likes:43, comments:9, runes:1 },
    { id:'s9', mood:'Happy', user:'SunnySlime', avatar:'☀️', time:'8h ago', title:'Pagi yang cerah!', text:'Bangun pagi, ngeliat harga token ijo semua. Mood langsung naik 📈', likes:71, comments:14, runes:4 },
    { id:'s10', mood:'Excited', user:'MoonSlime', avatar:'🌙', time:'10h ago', title:'Mint berhasil!', text:'Akhirnya kebagian slot mint setelah nunggu 2 jam. Worth it banget!', likes:112, comments:27, runes:9 },
    { id:'s11', mood:'Angry', user:'StormSlime', avatar:'⚡', time:'11h ago', title:'Kena scam lagi 😤', text:'Udah kesekian kali warning tapi masih ada aja yang kena. Hati-hati bro.', likes:60, comments:33, runes:5 },
    { id:'s12', mood:'Sleepy', user:'CloudSlime', avatar:'☁️', time:'13h ago', title:'Ngantuk tapi FOMO', text:'Udah jam 2 pagi tapi masih mantengin chart. Slime macam apa ini.', likes:38, comments:7, runes:1 }
  ];

  const STORAGE_KEY = 'slimeRunes_journals';
  const LIKED_KEY = 'slimeRunes_likedPosts';
  const SAVED_KEY = 'slimeRunes_savedPosts';

  function getMyPosts(){
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').map(p => ({
      id: p.id,
      mood: p.mood,
      user: 'You',
      avatar: p.emoji || '🐸',
      time: p.dateLabel || 'just now',
      title: p.title,
      text: p.body,
      likes: p.likes || 0,
      comments: 0,
      runes: 0,
      mine: true
    }));
  }

  function getLiked(){
    return JSON.parse(localStorage.getItem(LIKED_KEY) || '[]');
  }
  function toggleLiked(id){
    const liked = getLiked();
    const idx = liked.indexOf(id);
    if (idx === -1) liked.push(id); else liked.splice(idx,1);
    localStorage.setItem(LIKED_KEY, JSON.stringify(liked));
    return liked.includes(id);
  }

  function getSaved(){
    return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');
  }
  function toggleSaved(id){
    const saved = getSaved();
    const idx = saved.indexOf(id);
    if (idx === -1) saved.push(id); else saved.splice(idx,1);
    localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
    return saved.includes(id);
  }

  let allPosts = [...getMyPosts(), ...SAMPLE_POSTS];
  let visibleCount = 8;
  let activeMood = 'All';
  let searchTerm = '';
  let sortMode = 'latest';

  const feedGrid = document.getElementById('feedGrid');
  const loadMoreWrap = document.getElementById('loadMoreWrap');

  function renderCard(post){
    const mc = MOOD_COLORS[post.mood];
    const liked = getLiked().includes(post.id);
    const likeCount = post.likes + (liked && !post._likeCounted ? 0 : 0);
    return `
      <div class="jcard" data-mood="${post.mood}">
        <div class="jcard-head">
          <span class="mood-badge" style="background:${mc.bg}; color:${mc.text}">${MOOD_EMOJI[post.mood]} ${post.mood}</span>
          <div class="jcard-head-icons">
            <button class="save-btn ${getSaved().includes(post.id) ? 'saved' : ''}" data-id="${post.id}" title="Save">🔖</button>
            <button title="More">⋯</button>
          </div>
        </div>
        <div class="jcard-user">
          <div class="avatar" style="background:${mc.bg}">${post.avatar}</div>
          <div>
            <div class="uname">${post.user} ${post.mine ? '' : '<span style=\"color:#3f7d1c\">✓</span>'}</div>
            <div class="utime">${post.time}</div>
          </div>
        </div>
        <h3>${post.title}</h3>
        <p class="jtext">${post.text}</p>
        <div class="jcard-photo" style="background: radial-gradient(circle at 30% 25%, ${mc.bg}, ${mc.solid}55 80%)">${MOOD_EMOJI[post.mood]}</div>
        <div class="jcard-stats">
          <button class="like-btn ${liked ? 'liked':''}" data-id="${post.id}">
            <span class="heart">${liked ? '❤️' : '🤍'}</span> <span class="like-count">${post.likes + (liked ? 1 : 0)}</span>
          </button>
          <span>💬 ${post.comments}</span>
          <span>💎 ${post.runes}</span>
        </div>
      </div>
    `;
  }

  function getFiltered(){
    let list = allPosts.filter(p => activeMood === 'All' || p.mood === activeMood);
    if (searchTerm.trim()){
      const t = searchTerm.toLowerCase();
      list = list.filter(p => p.title.toLowerCase().includes(t) || p.text.toLowerCase().includes(t));
    }
    if (sortMode === 'popular'){
      list = [...list].sort((a,b) => b.likes - a.likes);
    }
    return list;
  }

  function render(){
    const filtered = getFiltered();
    const toShow = filtered.slice(0, visibleCount);
    feedGrid.innerHTML = toShow.map(renderCard).join('');
    loadMoreWrap.style.display = visibleCount < filtered.length ? 'block' : 'none';

    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const isLiked = toggleLiked(id);
        btn.classList.toggle('liked', isLiked);
        btn.querySelector('.heart').textContent = isLiked ? '❤️' : '🤍';
        const countEl = btn.querySelector('.like-count');
        const base = allPosts.find(p => p.id === id).likes;
        countEl.textContent = base + (isLiked ? 1 : 0);
      });
    });

    document.querySelectorAll('.save-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const isSaved = toggleSaved(id);
        btn.classList.toggle('saved', isSaved);
      });
    });
  }

  document.querySelectorAll('.mood-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeMood = chip.dataset.mood;
      visibleCount = 8;
      render();
    });
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    visibleCount = 8;
    render();
  });

  document.getElementById('sortSelect').addEventListener('change', (e) => {
    sortMode = e.target.value;
    render();
  });

  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    visibleCount += 4;
    render();
  });

  render();

  /* ---------- TODAY'S MOOD DONUT ---------- */
  const moodStats = [
    { mood:'Happy', pct:42 },
    { mood:'Sleepy', pct:20 },
    { mood:'Angry', pct:15 },
    { mood:'Sad', pct:12 },
    { mood:'Excited', pct:8 },
    { mood:'Chaos', pct:3 }
  ];
  let acc = 0;
  const gradientParts = moodStats.map(m => {
    const start = acc;
    acc += m.pct;
    return `${MOOD_COLORS[m.mood].solid} ${start}% ${acc}%`;
  });
  document.getElementById('moodDonut').style.background =
    `conic-gradient(${gradientParts.join(',')})`;

  document.getElementById('moodLegend').innerHTML = moodStats.map(m => `
    <div class="row">
      <span class="dot-label"><span class="dot" style="background:${MOOD_COLORS[m.mood].solid}"></span>${m.mood}</span>
      <span class="pct">${m.pct}%</span>
    </div>
  `).join('');
</script>

</body>
</html>
